<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L Platform | Premium Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00b4d8; --border: rgba(255, 255, 255, 0.1); }
        
        body {
            /* العودة للخلفية الصورية المفضلة لديك */
            background: linear-gradient(rgba(2, 8, 23, 0.85), rgba(2, 8, 23, 0.85)), 
                        url('https://images.unsplash.com/photo-1514525253361-bee8a48790c3?q=80&w=2000'); /* صورة فخمة ثابتة */
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #ffffff; font-family: 'Cairo', sans-serif; margin: 0;
        }

        nav {
            border-bottom: 1px solid var(--border);
            padding: 1rem 10%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(2, 8, 23, 0.9); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-size: 1.6rem; font-weight: 800; text-decoration: none; color: white; }
        .logo span { color: var(--primary); }

        /* البحث الذكي */
        .search-box { position: relative; }
        .search-box input {
            padding: 10px 20px; border-radius: 20px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.05); color: white; outline: none; width: 250px;
        }
        .search-box input:focus { border-color: var(--primary); }

        .container { display: grid; grid-template-columns: repeat(12, 1fr); gap: 2rem; padding: 3rem 10%; }

        .shadcn-card {
            background: rgba(2, 8, 23, 0.7); border: 1px solid var(--border);
            border-radius: 1.2rem; padding: 1.5rem; backdrop-filter: blur(10px); transition: 0.4s;
        }
        .shadcn-card:hover { border-color: var(--primary); transform: translateY(-5px); }

        /* تنسيق صور الفنانين */
        .artist-grid { grid-column: span 12; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
        .artist-card { text-align: center; text-decoration: none; color: white; }
        .artist-img { 
            width: 150px; height: 150px; border-radius: 50%; object-fit: cover; 
            border: 3px solid var(--border); transition: 0.3s; margin-bottom: 10px;
        }
        .artist-card:hover .artist-img { border-color: var(--primary); transform: scale(1.05); }

        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } .search-box { display: none; } }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">L <span>PLATFORM</span></a>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ابحث باسم الفنان..." onkeypress="handleSearch(event)">
    </div>
</nav>

<div class="container">
    <div class="shadcn-card" style="grid-column: span 12;">
        <h1>بوابة الفنانين والتريندات 2026 ⭐</h1>
        <p>استكشف ملفات الفنانين وآخر أخبار المهرجانات.</p>
    </div>

    <div class="artist-grid">
        <a href="artists/aya-samaha.html" class="artist-card">
            <img src="https://via.placeholder.com/150?text=Aya+Samaha" alt="آية سماحة" class="artist-img">
            <div>آية سماحة</div>
        </a>

        <a href="artists/wegz.html" class="artist-card">
            <img src="https://via.placeholder.com/150?text=Wegz" alt="ويجز" class="artist-img">
            <div>ويجز</div>
        </a>

        <a href="artists/ahmed-dash.html" class="artist-card">
            <img src="https://via.placeholder.com/150?text=Ahmed+Dash" alt="أحمد داش" class="artist-img">
            <div>أحمد داش</div>
        </a>
    </div>
</div>

<script>
    function handleSearch(event) {
        if (event.key === "Enter") {
            let query = document.getElementById("searchInput").value.toLowerCase().trim();
            if (query === "ويجز") window.location.href = "artists/wegz.html";
            else if (query === "آية سماحة") window.location.href = "artists/aya-samaha.html";
            else if (query === "أحمد داش") window.location.href = "artists/ahmed-dash.html";
            else alert("عذراً، هذا الفنان غير مسجل حالياً.");
        }
    }
</script>

</body>
</html>
