<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L Platform | المنصة</title>
    <style>
        :root { 
            /* --- اختر اللون هنا --- */
            
            /* الخيار 1: الأحمر (المفضل لك) */
            --accent: #e63946; 
            
            /* الخيار 2: الأزرق السماوي (جربه بتغيير الكود لـ #00b4d8) */
            /* --accent: #00b4d8; */

            --bg: #0f1014; 
            --card: #1a1c23; 
            --text: #f1f1f1;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 8%; background: #000; border-bottom: 3px solid var(--accent);
        }
        .logo { font-size: 26px; font-weight: 800; letter-spacing: 2px; }
        .logo span { color: var(--accent); }
        
        .hero { 
            background: linear-gradient(45deg, #000, #1a1a1a); 
            padding: 80px 8%; text-align: center; border-bottom: 1px solid #333;
        }
        .hero h1 { font-size: 50px; margin: 0; }
        .hero span { color: var(--accent); }
        .btn { 
            display: inline-block; margin-top: 20px; padding: 12px 35px; 
            background: var(--accent); color: white; text-decoration: none; 
            border-radius: 5px; font-weight: bold; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--accent); }

        .container { display: grid; grid-template-columns: 3fr 1fr; gap: 30px; padding: 40px 8%; }
        .card { 
            background: var(--card); border-radius: 10px; overflow: hidden; 
            border-bottom: 4px solid #333; transition: 0.3s;
        }
        .card:hover { border-bottom-color: var(--accent); }
        .card-img { width: 100%; height: 200px; background: #333; } /* مكان الصورة */
        .card-content { padding: 20px; }
        .card-content h3 { margin: 0; font-size: 22px; }
        
        .sidebar-box { 
            background: var(--card); padding: 20px; border-radius: 10px; 
            border: 1px solid var(--accent); text-align: center;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">L <span>PLATFORM</span></div>
    <nav>
        <button style="background:none; border:1px solid var(--accent); color:var(--accent); padding:5px 15px; cursor:pointer;" onclick="changeColor('#00b4d8')">أزرق سماوي</button>
        <button style="background:none; border:1px solid var(--accent); color:var(--accent); padding:5px 15px; cursor:pointer;" onclick="changeColor('#e63946')">أحمر ملكي</button>
    </nav>
</header>

<section class="hero">
    <h1>المنصة <span>L</span></h1>
    <p>بوابتك لنشر أعمالك الفنية وتصدر التريند</p>
    <a href="#" class="btn">ابدأ الآن</a>
</section>

<div class="container">
    <div class="main-content">
        <div class="card">
            <div class="card-img"></div>
            <div class="card-content">
                <h3>عنوان الخبر يظهر هنا بهذا التنسيق</h3>
                <p style="color: #888;">تفاصيل الخبر الفني المثير الذي سيكتبه لك Gemini...</p>
            </div>
        </div>
    </div>

    <aside>
        <div class="sidebar-box">
            <h4 style="color: var(--accent);">منصة الإعلانات</h4>
            <p>انشر عملك الفني هنا</p>
        </div>
    </aside>
</div>

<script>
    function changeColor(color) {
        document.documentElement.style.setProperty('--accent', color);
    }
</script>

</body>
</html>
