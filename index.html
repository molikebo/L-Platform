<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L Platform | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --background: #020817;
            --foreground: #ffffff;
            --primary: #00b4d8;
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(15, 23, 42, 0.6); /* شفافية بسيطة لزوم الأنيميشن */
        }

        /* خلفية أنيميشن هادئة */
        body {
            background: linear-gradient(-45deg, #020817, #0f172a, #010409, #020817);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--foreground);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* القائمة العلوية (Menu) */
        nav {
            border-bottom: 1px solid var(--border);
            padding: 0.8rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(2, 8, 23, 0.7);
            backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 1000;
        }

        .nav-links { display: flex; gap: 2rem; list-style: none; margin: 0; padding: 0; }
        .nav-links a { 
            color: #94a3b8; text-decoration: none; font-size: 0.9rem; 
            font-weight: 500; transition: 0.3s; 
        }
        .nav-links a:hover { color: var(--primary); }

        .logo { font-size: 1.4rem; font-weight: 800; color: white; text-decoration: none; }
        .logo span { color: var(--primary); }

        /* Bento Grid */
        .container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1.5rem;
            padding: 2.5rem 10%;
        }

        .shadcn-card {
            grid-column: span 4;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .shadcn-card:hover { 
            transform: translateY(-5px); 
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 180, 216, 0.1);
        }

        .featured { grid-column: span 8; }

        .btn-primary {
            background: var(--primary);
            color: #000;
            padding: 0.7rem;
            border-radius: 0.5rem;
            border: none;
            width: 100%;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
        }

        input, textarea {
            width: 100%; background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 0.7rem; border-radius: 0.4rem; color: white;
            margin-bottom: 0.8rem; box-sizing: border-box;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; } /* يختفي في الموبايل لتبسيطه حالياً */
            .shadcn-card, .featured { grid-column: span 12; }
        }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">L <span>PLATFORM</span></a>
    <ul class="nav-links">
        <li><a href="index.html">الرئيسية</a></li>
        <li><a href="#">التريند</a></li>
        <li><a href="#">أخبار الفن</a></li>
        <li><a href="#">عن المنصة</a></li>
    </ul>
</nav>

<div class="container">
    <div class="shadcn-card featured">
        <h1 style="color: var(--primary);">مستقبل المنصة L في 2026</h1>
        <p style="color: #cbd5e1; font-size: 1.1rem;">أهلاً بكم في النسخة المطورة من منصتنا. نحن هنا لنجمع بين الفن والتكنولوجيا في مكان واحد.</p>
        <button class="btn-primary" style="width: auto; padding: 0.7rem 2rem;">اكتشف المزيد</button>
    </div>

    <div class="shadcn-card">
        <h3>انشر عملك 🚀</h3>
        <form name="contact" method="POST" data-netlify="true">
            <input type="text" name="name" placeholder="الاسم الكامل">
            <input type="email" name="email" placeholder="البريد الإلكتروني">
            <textarea name="message" placeholder="ماذا تريد أن تنشر؟" rows="3"></textarea>
            <button type="submit" class="btn-primary">إرسال الآن</button>
        </form>
    </div>
</div>

</body>
</html>
